<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selector CSS</title>
</head>
<body>
    <div class="texto">
        Contenido que se va a copiar al primer párrafo del documento
    </div>
    <div class="texto">
        Este contenido no se va a copiar.
        Lo copiado aparecerá en el párrafo que está debajo de este div.
    </div>
    <p></p>
    <p>
        <button id="copiar">Copiar</button>
    </p>
</body>
</html>
