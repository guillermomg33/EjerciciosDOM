<!DOCTYPE html>
<html lang="es-ES">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="js/ejercicio10.js"></script>
    <link rel="stylesheet" href="css/ejercicio10.css">
    <title>Imagen de sustitución</title>
</head>
<body>
    <h1>JavaScript puede cambiar los atributos HTML</h1>
    
    <p>Este ejemplo cambia una imagen HTML por otra, cambiando el atributo src de la etiqueta</p>
    <div id="imagen">
        <img src="img/pic_bulboff.gif" alt="Bombilla apagada" id="imagenSust">
    </div>
    
    <p>Haz click sobre la bombilla para encenderla y apagarla</p>
</body>
</html>
